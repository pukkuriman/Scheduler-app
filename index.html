<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #f5f6fa;
  --surface:   #ffffff;
  --surface2:  #f0f1f6;
  --border:    #dde0ea;
  --border2:   #c8ccd8;
  --text:      #1a1d2e;
  --muted:     #7c82a0;
  --accent:    #4f6ef7;
  --accent-lt: #eef1fe;
  --accent2:   #3a57e8;
  --blue:      rgba(79,110,247,0.18);
  --blue-bdr:  #4f6ef7;
  --blue-fill: rgba(79,110,247,0.13);
  --red:       rgba(239,68,68,0.13);
  --red-bdr:   #ef4444;
  --green:     #16a34a;
  --shadow:    0 1px 4px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.05);
  --radius:    12px;
  font-family: 'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif;
  font-size: 15px;
}

body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0;
}

#app { width: 100%; }

/* 非トップ画面はコンテンツを中央に制限 */
.screen:not(.top-screen) {
  max-width: 800px;
  margin: 0 auto;
  padding: 36px 20px 80px;
}

.screen { animation: fadeUp .2s ease both; }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ===== ボタン ===== */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  border: none; border-radius: 8px; padding: 11px 22px;
  font-size: .9rem; font-weight: 600; cursor: pointer;
  transition: background .15s, box-shadow .15s, transform .1s;
  text-decoration: none; letter-spacing: .01em;
}
.btn:active { transform: scale(.98); }
.btn-primary {
  background: var(--accent); color: #fff;
  box-shadow: 0 2px 8px rgba(79,110,247,.3);
}
.btn-primary:hover { background: var(--accent2); box-shadow: 0 4px 12px rgba(79,110,247,.4); }
.btn-secondary {
  background: var(--surface); color: var(--muted);
  border: 1px solid var(--border2);
}
.btn-secondary:hover { background: var(--surface2); color: var(--text); }

/* ===== 設定画面 ===== */
.setup-screen { max-width: 480px; }

.app-title {
  font-size: 1.9rem; font-weight: 800; letter-spacing: -.04em;
  color: var(--text); margin-bottom: 6px;
}
.app-title span {
  background: linear-gradient(120deg, var(--accent), #818cf8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.subtitle { color: var(--muted); font-size: .87rem; margin-bottom: 32px; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 28px;
  margin-bottom: 16px;
}

.setup-form { display: flex; flex-direction: column; gap: 20px; }

.field { display: flex; flex-direction: column; gap: 7px; }
.field > label {
  font-size: .8rem; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: .06em;
}
.field input[type="date"],
.field select {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 8px; color: var(--text);
  padding: 9px 13px; font-size: .93rem; outline: none;
  transition: border-color .15s, box-shadow .15s;
  width: 100%;
}
.field input[type="date"]:focus,
.field select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(79,110,247,.12);
}

.field-row { display: flex; gap: 12px; }
.field-row .field { flex: 1; }

.number-row { display: flex; align-items: center; gap: 14px; }
.num-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--surface2); border: 1.5px solid var(--border2);
  color: var(--text); font-size: 1.1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, border-color .15s;
  flex-shrink: 0;
}
.num-btn:hover { background: var(--accent-lt); border-color: var(--accent); color: var(--accent); }
#count-val { font-size: 1.25rem; font-weight: 700; min-width: 28px; text-align: center; color: var(--text); }

/* 精度ラジオ */
.radio-group { display: flex; gap: 8px; }
.radio-opt {
  flex: 1; display: flex; align-items: center; justify-content: center;
  gap: 6px; padding: 9px 12px;
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 8px; cursor: pointer; font-size: .88rem; font-weight: 500;
  transition: all .15s; user-select: none;
}
.radio-opt input { display: none; }
.radio-opt:has(input:checked) {
  background: var(--accent-lt); border-color: var(--accent); color: var(--accent);
}
.radio-opt .dot-icon {
  width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid currentColor; position: relative; flex-shrink: 0;
}
.radio-opt:has(input:checked) .dot-icon::after {
  content: ''; position: absolute; inset: 2px;
  background: var(--accent); border-radius: 50%;
}

/* ===== グリッド画面 ===== */
.grid-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 20px; gap: 12px; flex-wrap: wrap;
}
.person-label { font-size: 1.2rem; font-weight: 700; color: var(--text); }
.organizer-badge {
  display: inline-block; font-size: .72rem; font-weight: 600;
  background: var(--accent-lt); color: var(--accent);
  border: 1px solid rgba(79,110,247,.25);
  border-radius: 99px; padding: 2px 9px; margin-left: 7px;
  vertical-align: middle;
}
.header-hint { font-size: .8rem; color: var(--muted); margin-top: 4px; }

.dots { display: flex; gap: 7px; padding-top: 4px; align-items: center; }
.dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--border2); transition: background .2s;
}
.dot.done   { background: var(--accent); opacity: .4; }
.dot.active {
  background: var(--accent);
  box-shadow: 0 0 0 3px rgba(79,110,247,.2);
}

/* テーブル */
.schedule-table {
  width: 100%; border-collapse: collapse;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.schedule-table th {
  background: var(--surface2);
  font-size: .75rem; color: var(--muted);
  padding: 9px 14px; text-align: left; font-weight: 600;
  border-bottom: 1px solid var(--border);
  letter-spacing: .04em; text-transform: uppercase;
}
.schedule-table td { border-bottom: 1px solid var(--border); vertical-align: middle; }
.schedule-table tr:last-child td { border-bottom: none; }
.schedule-table tr:hover td { background: rgba(79,110,247,.025); }

.date-cell {
  padding: 7px 14px; white-space: nowrap;
  font-size: .82rem; min-width: 78px;
}
.date-main { font-weight: 600; color: var(--text); }
.date-dow  { font-size: .72rem; color: var(--muted); margin-top: 1px; }
.weekend .date-cell { background: #faf8ff; }
.weekend .date-main { color: #6366f1; }

.bar-cell { padding: 7px 14px 14px; width: 100%; }

/* ===== 時間バー ===== */
.bar-wrap {
  position: relative; height: 38px; border-radius: 7px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  cursor: ew-resize; touch-action: none; overflow: visible;
}
.bar-wrap:hover { border-color: var(--border2); }

.bar-red-left, .bar-red-right {
  position: absolute; top: 0; height: 100%;
  background: var(--red); pointer-events: none;
}
.bar-red-left  { left: 0; border-radius: 6px 0 0 6px; border-right: 1.5px solid var(--red-bdr); }
.bar-red-right { right: 0; border-radius: 0 6px 6px 0; border-left: 1.5px solid var(--red-bdr); }

.bar-blue {
  position: absolute; top: 0; height: 100%;
  background: var(--blue-fill); pointer-events: none;
}

.handle {
  position: absolute; top: 50%;
  transform: translate(-50%, -50%);
  width: 16px; height: 28px;
  background: var(--accent); border-radius: 4px;
  cursor: ew-resize; z-index: 3;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(79,110,247,.4);
  transition: background .1s, box-shadow .1s;
}
.handle:hover {
  background: var(--accent2);
  box-shadow: 0 3px 12px rgba(79,110,247,.5);
}
.handle::after {
  content: '';
  width: 2px; height: 11px;
  background: rgba(255,255,255,.5);
  border-radius: 2px;
  box-shadow: 3px 0 0 rgba(255,255,255,.5), -3px 0 0 rgba(255,255,255,.5);
}

/* 前の人の範囲を薄く表示 */
.bar-prev {
  position: absolute; top: 4px; height: calc(100% - 8px);
  background: rgba(79,110,247,.07);
  border: 1px dashed rgba(79,110,247,.3);
  border-radius: 4px; pointer-events: none; z-index: 0;
}

/* 時刻ツールチップ */
.bar-tip {
  position: absolute; bottom: -24px; left: 50%;
  transform: translateX(-50%);
  font-size: .7rem; color: var(--accent);
  white-space: nowrap; pointer-events: none;
  display: none; z-index: 10;
  background: var(--accent-lt);
  border: 1px solid rgba(79,110,247,.25);
  border-radius: 4px; padding: 2px 7px;
  font-weight: 600;
}

/* 時刻軸ラベル */
.time-labels {
  display: flex; justify-content: space-between;
  font-size: .65rem; color: var(--muted);
  padding: 3px 0; margin-top: 3px;
  pointer-events: none; user-select: none;
}

/* アクションバー */
.action-bar {
  display: flex; gap: 10px; justify-content: flex-end;
  flex-wrap: wrap; margin-top: 20px;
}

/* ===== シェア画面 ===== */
.share-screen { display: flex; flex-direction: column; align-items: center; padding-top: 32px; }
.share-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 40px 32px;
  max-width: 520px; width: 100%; text-align: center;
}
.share-icon { font-size: 2.4rem; margin-bottom: 14px; }
.share-card h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; color: var(--text); }
.share-hint { color: var(--muted); font-size: .85rem; margin-bottom: 22px; line-height: 1.6; }
.share-hint strong { color: var(--accent); }

.url-row { display: flex; gap: 8px; margin-bottom: 8px; }
.url-input {
  flex: 1; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 7px; color: var(--muted); padding: 9px 12px;
  font-size: .73rem; font-family: 'Courier New', monospace;
  outline: none; overflow: hidden; text-overflow: ellipsis;
}
.url-len { font-size: .72rem; color: var(--muted); margin-bottom: 16px; }
.url-len span { color: var(--accent); font-weight: 600; }
.btn-copy {
  background: var(--surface2); border: 1.5px solid var(--border2);
  border-radius: 7px; color: var(--text); padding: 9px 16px;
  font-size: .84rem; cursor: pointer; white-space: nowrap;
  font-weight: 500; transition: background .15s;
}
.btn-copy:hover { background: var(--accent-lt); border-color: var(--accent); color: var(--accent); }
.copy-fb { font-size: .78rem; color: var(--green); min-height: 1.2em; margin-bottom: 4px; font-weight: 500; }

/* ===== 結果画面 ===== */
.result-header { margin-bottom: 22px; }
.result-title { font-size: 1.2rem; font-weight: 700; }
.result-subtitle { font-size: .83rem; color: var(--muted); margin-top: 5px; }


.result-list { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }
.result-item {
  display: flex; gap: 0; align-items: stretch;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
}
.result-item-accent { width: 4px; background: var(--accent); flex-shrink: 0; }
.result-item-body { display: flex; align-items: center; gap: 14px; padding: 12px 16px; flex: 1; }
.result-date { font-weight: 600; min-width: 110px; font-size: .88rem; }
.result-time { color: var(--accent); font-size: .88rem; font-weight: 500; }

.no-result {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 24px; text-align: center;
  color: var(--muted); margin-bottom: 24px;
}

/* disabled bar */
.bar-disabled {
  background: #fef2f2; border: 1.5px solid #fca5a5;
  border-radius: 7px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  font-size: .75rem; color: #ef4444;
}

/* 参加不可ボタン列 */
.unavail-cell {
  padding: 6px 10px 6px 0;
  white-space: nowrap;
  vertical-align: middle;
}
.unavail-btn {
  font-size: .75rem; font-weight: 600; padding: 5px 10px;

<script>
// ============================================================
// 定数
// ============================================================
const DAY_LABELS  = ['日','月','火','水','木','金','土'];

// ============================================================
// 広告スロット
// AdSense が有効な場合のみ表示される。
// data-ad-client と data-ad-slot を自分の値に差し替えること。

const AD_SLOT   = 'YOUR_AD_SLOT_ID';          // ← 要変更

function adSlotHtml() {
  return `<div class="ad-slot">
    <p class="ad-label">広告</p>
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="${AD_CLIENT}"
         data-ad-slot="${AD_SLOT}"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
  </div>`;
}

function pushAd() {
  // DOM に ins タグが追加された後に呼ぶ
  try {
    (window.adsbygoogle = window.adsbygoogle || []).push({});
  } catch(e) { /* AdSense 未設定時は無視 */ }
}
const HOUR_MARKS  = ['0:00','3:00','6:00','9:00','12:00','15:00','18:00','21:00','24:00'];
const MINS_IN_DAY = 1440;

// ============================================================
// URL圧縮エンコード（ビット圧縮 + Base64URL）
//
// レイアウト:
//   5bit  … total-1  (参加者数 1〜20)
//   5bit  … remaining-1
//   1bit  … step (0=1分, 1=5分)
//   各日:  12bit start + 12bit end  ← 12bit で 0〜4095 (1440分をカバー)
//          start=end=0 → 不参加(null)
//   日数は end-start から算出（maxDays=62日まで対応）
//   先頭に日数を6bit格納
// ============================================================

class BitWriter {
  constructor() { this.bytes=[]; this.buf=0; this.bits=0; }
  write(v,n) {
    for(let i=n-1;i>=0;i--){
      this.buf=(this.buf<<1)|((v>>i)&1);
      if(++this.bits===8){this.bytes.push(this.buf);this.buf=0;this.bits=0;}
    }
  }
  finish() {
    if(this.bits>0) this.bytes.push(this.buf<<(8-this.bits));
    return new Uint8Array(this.bytes);
  }
}
class BitReader {
  constructor(bytes){this.bytes=bytes;this.pos=0;}
  read(n){
    let v=0;
    for(let i=0;i<n;i++){
      const bi=this.pos>>3, bit=7-(this.pos&7);
      v=(v<<1)|((this.bytes[bi]>>bit)&1);
      this.pos++;
    }
    return v;
  }
}
function toB64u(bytes){
  let s=''; bytes.forEach(b=>s+=String.fromCharCode(b));
  return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function fromB64u(str){
  const b64=str.replace(/-/g,'+').replace(/_/g,'/');
  return Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
}

// タイムゾーンに依存しない日付フォーマット（YYYY-MM-DD）
function formatDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function encodeState(config, selections, remaining) {
  const dates = dateRange(config.start, config.end);
  const w = new BitWriter();
  w.write(config.total - 1, 5);
  w.write(remaining - 1,    5);
  w.write(config.step === 1 ? 0 : 1, 1);
  w.write(dates.length - 1, 6);
  const sd = new Date(config.start+'T00:00:00');
  w.write(sd.getFullYear(), 12);
  w.write(sd.getMonth()+1,   4);
  w.write(sd.getDate(),      5);
  const cur = new Date(config.start + 'T00:00:00');
  for (let i = 0; i < dates.length; i++) {
    const dKey = formatDate(cur);
    const sel  = selections[dKey];
    if (!sel) { w.write(4095,12); w.write(4095,12); }
    else       { w.write(sel.startMin,12); w.write(sel.endMin,12); }
    cur.setDate(cur.getDate() + 1);
  }
  // タイトル: UTF-8バイト列の長さを6bit(0〜63)、続いてバイト列を各8bit
  const title = config.title || '';
  const titleBytes = Array.from(new TextEncoder().encode(title.slice(0, 20)));
  w.write(titleBytes.length, 6);
  titleBytes.forEach(b => w.write(b, 8));
  return toB64u(w.finish());
}

function decodeState(str) {
  const bytes = fromB64u(str);
  const r = new BitReader(bytes);
  const total     = r.read(5) + 1;
  const remaining = r.read(5) + 1;
  const stepBit   = r.read(1);
  const step      = stepBit === 0 ? 1 : 5;
  const numDays   = r.read(6) + 1;
  const year  = r.read(12);
  const month = r.read(4);
  const day   = r.read(5);
  const startStr = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  // ローカル日付で計算（toISOStringはUTC基準でずれるため使わない）
  const startDate = new Date(startStr + 'T00:00:00');
  const endDate   = new Date(startStr + 'T00:00:00');
  endDate.setDate(endDate.getDate() + numDays - 1);
  const endStr = formatDate(endDate);

  // エンコード時と同じ dateRange でキーを生成し、ビット列と1対1対応させる
  // ここで startDate を使い直接ループすることで dateRange との不一致を防ぐ
  const config = { start: startStr, end: endStr, total, step };
  const selections = {};
  const cur = new Date(startStr + 'T00:00:00');
  for (let i = 0; i < numDays; i++) {
    const dKey = formatDate(cur);
    const s = r.read(12);
    const e = r.read(12);
    selections[dKey] = (s === 4095 && e === 4095) ? null : { startMin: s, endMin: e };
    cur.setDate(cur.getDate() + 1);
  }
  // タイトル（末尾にオプションで付加、古いURLには存在しない）
  let title = '';
  try {
    const titleLen = r.read(6);
    if (titleLen > 0) {
      const titleBytes = [];
      for (let i = 0; i < titleLen; i++) titleBytes.push(r.read(8));
      title = new TextDecoder().decode(new Uint8Array(titleBytes));
    }
  } catch(e) { /* 古いURLにはタイトルがないため無視 */ }
  config.title = title;
  return { config, selections, remaining };
}

function buildShareUrl(config, selections, remaining) {
  return location.origin + location.pathname + '#' + encodeState(config, selections, remaining);
}
function loadFromUrl() {
  const hash = location.hash.slice(1);
  if (!hash) return null;
  try {
    if (hash.startsWith('R')) {
      // 結果URL: 先頭の 'R' を除いてデコード
      const decoded = decodeState(hash.slice(1));
      return { ...decoded, isResult: true };
    }
    return decodeState(hash);
  } catch(e) { console.warn(e); return null; }
}

// ============================================================
// ユーティリティ
// ============================================================
function dateRange(start, end) {
  const dates=[], cur=new Date(start+'T00:00:00'), last=new Date(end+'T00:00:00');
  while(cur<=last){ dates.push(formatDate(cur)); cur.setDate(cur.getDate()+1); }
  return dates;
}
function minutesToPct(m){ return (m/MINS_IN_DAY)*100; }
function pctToMinutes(p){ return Math.round((p/100)*MINS_IN_DAY); }
function snapMins(m, step){ return Math.round(m/step)*step; }
function minsToLabel(m){
  return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
}
function escAttr(s){ return s.replace(/"/g,'&quot;'); }
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function todayStr(){ return formatDate(new Date()); }
function addDays(dateStr, n){
  const d=new Date(dateStr+'T00:00:00'); d.setDate(d.getDate()+n);
  return formatDate(d);
}

// 開催数カウンター（CountAPI を使用 - 全ユーザー共有）
// https://api.countapi.xyz - 無料・登録不要・グローバル共有
// ============================================================
const COUNT_API = 'https://api.countapi.xyz';
const COUNT_NS  = 'simplescheduler-app';
const COUNT_KEY = 'sessions';

// カウントを取得して表示
async function fetchCount() {
  try {
    const res = await fetch(`${COUNT_API}/get/${COUNT_NS}/${COUNT_KEY}`);
    if (!res.ok) return null;
    const data = await res.json();
    return data.value || 0;
  } catch(e) { return null; }
}

// カウントを+1して新しい値を返す
async function incrementCount() {
  try {
    const res = await fetch(`${COUNT_API}/hit/${COUNT_NS}/${COUNT_KEY}`);
    if (!res.ok) return null;
    const data = await res.json();
    return data.value || 0;
  } catch(e) { return null; }
}

// 表示用: 3桁カンマ区切り
function formatCount(n) {
  return (n == null) ? '---' : Number(n).toLocaleString('ja-JP');
}

// 2. グリッド選択画面
// savedSels: 戻るボタンで保持した入力内容（nullなら初期値）
// ============================================================
function showGridScreen(config, prevSelections, remaining, savedSels) {
  const dates = dateRange(config.start, config.end);
  const personIndex = config.total - remaining;
  const isFirst = prevSelections === null;
  const step = config.step || 1;

  // 初期選択を決定する
  // savedSels が渡されていればそれを最優先で使う（戻るボタン復元）
  const currentSels = {};
  dates.forEach(d => {
    if (savedSels !== null && savedSels !== undefined && Object.prototype.hasOwnProperty.call(savedSels, d)) {
      // savedSels[d] は { startMin, endMin } または null（参加不可）
      const sv = savedSels[d];
      currentSels[d] = sv ? { startMin: sv.startMin, endMin: sv.endMin } : null;
    } else if (isFirst) {
      currentSels[d] = { startMin: 540, endMin: 1080 };
    } else {
      const prev = prevSelections[d];
      // prev が存在しない（前の人が不参加 or URLデータなし）場合は null
      currentSels[d] = prev ? { startMin: prev.startMin, endMin: prev.endMin } : null;
    }
  });

  const dotsHtml = Array.from({length:config.total},(_,i)=>
    `<span class="dot ${i<personIndex?'done':i===personIndex?'active':''}"></span>`
  ).join('');

  const isOrganizer = personIndex === 0;

  const rowsHtml = dates.map(d => {
    const date = new Date(d+'T00:00:00');
    const dow  = DAY_LABELS[date.getDay()];
    const isWE = date.getDay()===0||date.getDay()===6;
    // prevSelections[d] が undefined（URLデコード漏れ）の場合はフォールバック
    const prev = isFirst ? null : (prevSelections[d] ?? null);
    // disabled: 1人目以外で prev が null（明示的に不参加）のとき
    // ただし undefined によるフォールバックは disabled にしない
    const prevExists = isFirst ? true : Object.prototype.hasOwnProperty.call(prevSelections, d);
    const disabled = !isFirst && prevExists && !prev;
    // 参加不可状態: currentSels[d] === null（かつ disabled でない）
    const isUnavail = !disabled && currentSels[d] === null;
    return `
      <tr class="${isWE?'weekend':''}" data-date="${d}">
        <td class="date-cell">
          <div class="date-main">${d.slice(5).replace('-','/')}</div>
          <div class="date-dow">${dow}</div>
        </td>
        <td class="bar-cell">
          ${disabled
            ? `<div class="bar-disabled">前の参加者が不参加</div>`
            : buildBarHtml(d, currentSels[d], prev, isUnavail)
          }
          ${disabled ? '' : `<div class="time-labels">${HOUR_MARKS.map(h=>`<span>${h}</span>`).join('')}</div>`}
        </td>
        ${disabled ? '' : `
        <td class="unavail-cell">
          <button class="unavail-btn ${isUnavail ? 'active' : ''}" data-date="${d}">
            参加不可
          </button>
        </td>`}
      </tr>`;
  }).join('');

  // --- 設定サマリー ---
  const startFmt = config.start.slice(5).replace('-','/');
  const endFmt   = config.end.slice(5).replace('-','/');

  // --- ステータスリスト ---
  const statusRows = Array.from({length: config.total}, (_,i) => {
    let cls, badge, name;
    if (i < personIndex) {
      cls = 'done'; badge = '入力済み'; name = `${i+1}人目${i===0?' (主催者)':''}`;
    } else if (i === personIndex) {
      cls = 'current'; badge = '入力中'; name = `${i+1}人目${i===0?' (主催者)':''}`;
    } else {
      cls = 'pending'; badge = '未入力'; name = `${i+1}人目`;

          ${startFmt} 〜 ${endFmt}（${dates.length}日間）
        </span>
        <span class="config-chip">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>

        <span class="config-chip">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>

          </div>
          <div class="header-hint">
            バーの端をドラッグして青い部分（参加可能）を調整
          </div>
        </div>
        <div class="dots">${dotsHtml}</div>
      </div>

      <table class="schedule-table">
        <thead><tr>
          <th style="width:78px">日付</th>
          <th>参加可能時間帯 &nbsp;<span style="font-weight:400;text-transform:none;letter-spacing:0">（青 = 参加可／赤 = 参加不可）</span></th>
          <th style="width:84px"></th>
        </tr></thead>
        <tbody>${rowsHtml}</tbody>

      </div>

      <div class="action-bar">

        <button class="btn btn-primary" id="next-btn">

        </button>

      <!-- 参加者ステータス -->

        <div class="status-title">参加者の入力状況</div>
        <div class="status-list">${statusRows}</div>

    </div>`;

  // バー初期化
  dates.forEach(d => {
    // bar-wrap-unavail（参加不可表示）は initBar 対象外
    const wrap = app.querySelector(`tr[data-date="${d}"] .bar-wrap[data-date]:not(.bar-wrap-unavail)`);
    if(wrap) {
      const prevSel = isFirst ? null : (prevSelections[d] ?? null);
      initBar(wrap, currentSels, d, prevSel, step);
    }
  });

  // 参加不可ボタン
  app.querySelectorAll('.unavail-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const d = btn.dataset.date;
      const prev = isFirst ? null : (prevSelections[d] ?? null);
      const clampMin = prev ? prev.startMin : 0;
      const clampMax = prev ? prev.endMin   : MINS_IN_DAY;

      if (btn.classList.contains('active')) {
        // 参加不可 → 参加可能に戻す（デフォルト範囲）

          buildBarHtml(d, null, prev, true) +

    const andSels = computeAnd(currentSels, prevSelections, isFirst);

      showPreviewScreen(andSels, config, () => {
        showGridScreen(config, prevSelections, remaining, snapshot);
      });
    }
  };
}

// ============================================================
// バーHTML
// ============================================================
function buildBarHtml(date, sel, prev, isUnavail) {
  // 参加不可の場合は全体を赤で表示（ハンドルなし）
  if (isUnavail) {
    const prevHtml = prev
      ? `<div class="bar-prev" style="left:${minutesToPct(prev.startMin).toFixed(3)}%;width:${(minutesToPct(prev.endMin)-minutesToPct(prev.startMin)).toFixed(3)}%"></div>`
      : '';
    return `
      <div class="bar-wrap bar-wrap-unavail" data-date="${date}" data-start="0" data-end="0">
        ${prevHtml}
        <div style="position:absolute;inset:0;background:var(--red);border-radius:5px;pointer-events:none;"></div>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
             font-size:.75rem;color:var(--red-bdr);font-weight:600;pointer-events:none;">終日参加不可</div>
      </div>`;
  }

  const s = sel ? minutesToPct(sel.startMin) : 0;
  const e = sel ? minutesToPct(sel.endMin)   : 100;
  const prevHtml = prev
    ? `<div class="bar-prev" style="left:${minutesToPct(prev.startMin).toFixed(3)}%;width:${(minutesToPct(prev.endMin)-minutesToPct(prev.startMin)).toFixed(3)}%"></div>`
    : '';
  return `
    <div class="bar-wrap" data-date="${date}"
         data-start="${sel?sel.startMin:0}" data-end="${sel?sel.endMin:MINS_IN_DAY}">
      ${prevHtml}
      <div data-role="red-left"  class="bar-red-left"  style="width:${s.toFixed(3)}%"></div>
      <div data-role="blue"      class="bar-blue"       style="left:${s.toFixed(3)}%;width:${(e-s).toFixed(3)}%"></div>
      <div data-role="red-right" class="bar-red-right"  style="width:${(100-e).toFixed(3)}%"></div>
      <div data-role="handle-l"  class="handle"         style="left:${s.toFixed(3)}%"></div>
      <div data-role="handle-r"  class="handle"         style="left:${e.toFixed(3)}%"></div>
      <div data-role="tip"       class="bar-tip"></div>
    </div>`;
}

// ============================================================
// ドラッグロジック（バー本体移動は削除、ハンドルのみ）
// ============================================================
function initBar(wrap, currentSels, date, prevSel, step) {
  const MIN_GAP  = Math.max(step, 5);
  const clampMin = prevSel ? prevSel.startMin : 0;
  const clampMax = prevSel ? prevSel.endMin   : MINS_IN_DAY;

  const el = role => wrap.querySelector(`[data-role="${role}"]`);

  function readMins(){ return { s:+wrap.dataset.start, e:+wrap.dataset.end }; }

  function applyMins(s, e) {
    s = snapMins(s, step);
    e = snapMins(e, step);
    s = Math.max(clampMin, Math.min(s, clampMax - MIN_GAP));
    e = Math.max(s + MIN_GAP, Math.min(e, clampMax));
    s = Math.min(s, e - MIN_GAP);
    wrap.dataset.start = s;
    wrap.dataset.end   = e;
    currentSels[date]  = { startMin:s, endMin:e };
    const sp = minutesToPct(s), ep = minutesToPct(e);
    el('red-left') .style.width = sp.toFixed(3)+'%';
    el('blue')     .style.left  = sp.toFixed(3)+'%';
    el('blue')     .style.width = (ep-sp).toFixed(3)+'%';
    el('red-right').style.width = (100-ep).toFixed(3)+'%';
    el('handle-l') .style.left  = sp.toFixed(3)+'%';
    el('handle-r') .style.left  = ep.toFixed(3)+'%';
    el('tip').textContent = `${minsToLabel(s)} 〜 ${minsToLabel(e)}`;
  }

  function pctFromEv(ev) {
    const rect = wrap.getBoundingClientRect();
    const x = ev.touches ? ev.touches[0].clientX : ev.clientX;
    return Math.max(0, Math.min(100, ((x-rect.left)/rect.width)*100));
  }

  // ハンドルがなければ（bar-wrap-unavail等）即リターン
  if (!el('handle-l') || !el('handle-r')) return;

  // ハンドルドラッグのみ（バー本体ドラッグは削除）
  ['handle-l','handle-r'].forEach(role => {
    const handle = el(role);
    const isLeft = role === 'handle-l';
    let dragging = false;

    const onStart = ev => {
      ev.preventDefault(); ev.stopPropagation();
      dragging = true;
      el('tip').style.display = 'block';
      window.addEventListener('mousemove', onMove);
      window.addEventListener('touchmove', onMove, {passive:false});
      window.addEventListener('mouseup',   onEnd);
      window.addEventListener('touchend',  onEnd);
    };
    const onMove = ev => {
      if(!dragging) return;
      ev.preventDefault();
      const mins = pctToMinutes(pctFromEv(ev));
      const {s,e} = readMins();
      isLeft ? applyMins(mins,e) : applyMins(s,mins);
    };
    const onEnd = () => {
      dragging = false;
      el('tip').style.display = 'none';
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('mouseup',   onEnd);
      window.removeEventListener('touchend',  onEnd);
    };
    handle.addEventListener('mousedown',  onStart);
    handle.addEventListener('touchstart', onStart, {passive:false});
  });
}

// ============================================================
// AND計算
// prev[d] が undefined（URLデコード漏れ等）のとき制約なしとして扱う
// ============================================================
function computeAnd(current, prev, isFirst) {
  if (isFirst) return current;
  const result = {};
  Object.keys(current).forEach(d => {
    const c = current[d];
    if (!c) { result[d] = null; return; }   // current が参加不可
    if (!prev) { result[d] = c; return; }   // prev自体がない → 制約なし
    const hasKey = Object.prototype.hasOwnProperty.call(prev, d);
    if (!hasKey) { result[d] = c; return; } // prevにdのキーがない → 制約なし
    const p = prev[d];
    if (!p) { result[d] = null; return; }   // prev が参加不可
    const s = Math.max(c.startMin, p.startMin);
    const e = Math.min(c.endMin,   p.endMin);
    result[d] = s < e ? { startMin: s, endMin: e } : null;
  });
  return result;
}

// ============================================================
// 4b. 結果画面（確定済み・URL永久保存＋シェア対応）
// ============================================================
function showResultScreen(andSels, config) {
  const dates  = dateRange(config.start, config.end);
  const okDays = dates.filter(d => andSels[d]);

  // 結果専用URL: remaining=1 で encodeState するとデコード時に「全員入力済み→結果表示」
  // remaining=0 は 5bit で表現できないため、special flag として remaining=1 を使い
  // decodeState 後に remaining===1 かつ URLから来た場合は結果画面へ飛ばす。
  // よりシンプルに: andSels をそのまま remaining=1 でエンコードし、
  // 開いた人は「1人目の入力画面」ではなく結果画面が出るよう、
  // 「remaining===config.total（=全員がandSels済みの状態）」で判定する。
  // 最も確実な方法: andSels を JSON+base64 で別パラメータに持つ。
  // ここでは既存の encodeState を流用し、remaining=1/total=1 として
  // 「1人参加・全員入力済み」な状態のURLを生成する。

  // 結果URLの生成:
  // config を total=1、selections=andSels、remaining=1 でエンコード
  // → 開いたとき remaining=1=total なので「最終人の入力画面」として表示されるが
  //   それは不便なので、isResult フラグを追加する。
  // 最もシンプルな実装: remaining を 0 代わりに特殊値 63（6bit max+1 ≡ -1的な意味）に
  // するのではなく、total と remaining が等しく remaining===1 のとき結果URLとみなす方針も複雑。
  //
  // 【採用する方針】
  // encodeState の remaining に 1 を渡し、config.total も 1 にする。
  // → decodeState で total=1, remaining=1 → personIndex=0, isFirst=true
  // → showGridScreen が表示されてしまう。
  //
  // 最終的にシンプルな方針: URL に ?result=1 を付加し、
  // そのフラグがある場合は loadFromUrl が { ..., isResult: true } を返し
  // showResultScreen を直接呼ぶ。
  // ただし既存の # ベースのエンコードを壊さないよう、
  // result フラグは hash の先頭に 'R' を付けることで識別する。

  // 結果URL: hash の先頭に 'R' を付けて結果画面であることを示す
  const resultHash = 'R' + encodeState(
    { ...config, total: config.total },
    andSels,
    1  // remaining=1 のダミー（結果URLでは使わない）
  );
  const resultUrl = location.origin + location.pathname + '#' + resultHash;

  // シェア用テキスト（URLを含む）
  const shareLines = okDays.length
    ? [config.title ? `【${config.title} 日程調整 結果】` : '【日程調整 結果】'].concat(
        okDays.map(d => {
          const date = new Date(d+'T00:00:00');
          const dow  = DAY_LABELS[date.getDay()];
          const {startMin, endMin} = andSels[d];
          return d.slice(5).replace('-','/') + '（' + dow + '） ' + minsToLabel(startMin) + '〜' + minsToLabel(endMin);
        }),
        [resultUrl]
      )
    : ['【日程調整 結果】', '共通の空き時間が見つかりませんでした。'];
  const shareText = shareLines.join('\n');
  const encodedShareText = encodeURIComponent(shareText);
  const hasNativeShare = !!(navigator.share);

  const items = okDays.map(d => {
    const date = new Date(d+'T00:00:00');
    const dow  = DAY_LABELS[date.getDay()];
    const {startMin,endMin} = andSels[d];
    return `<li class="result-item">
      <div class="result-item-accent"></div>
      <div class="result-item-body">
        <span class="result-date">${d.slice(5).replace('-','/')}（${dow}）</span>
        <span class="result-time">${minsToLabel(startMin)} 〜 ${minsToLabel(endMin)}</span>
      </div>
    </li>`;
  }).join('');

  app.innerHTML = `
    <div class="screen result-screen">
      <div class="result-header">
        ${config.title ? `<div style="font-size:.78rem;color:var(--accent);font-weight:700;
          text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">
          ${escHtml(config.title)}</div>` : ''}
        <div class="result-title">
          ${okDays.length ? '✅ 全員参加可能な日程' : '😔 共通の空き時間が見つかりませんでした'}
        </div>
        ${okDays.length
          ? `<div class="result-subtitle">${config.total}人全員が参加できる時間帯です</div>`
          : `<div class="result-subtitle">条件を変えて再調整してください</div>`
        }
      </div>
      ${okDays.length
        ? `<ul class="result-list">${items}</ul>`
        : `<div class="no-result">参加者全員が空いている時間帯がありませんでした。</div>`
      }

      ${okDays.length ? `
      <!-- 結果URLコピー欄 -->
      <div class="status-section" style="margin-bottom:20px">
        <div class="status-title">結果ページのURLを保存・共有する</div>
        <p style="font-size:.82rem;color:var(--muted);margin-bottom:10px;line-height:1.6">
          このURLをブックマークまたは共有すると、いつでも結果を確認できます
        </p>
        <div class="url-row" style="margin-bottom:10px">
          <input class="url-input" id="result-url-input"
            value="${escAttr(resultUrl)}" readonly />
          <button class="btn-copy" id="res-url-copy-btn">コピー</button>
        </div>
        <p class="copy-fb" id="res-copy-fb"></p>

        <div class="share-divider">アプリでシェア</div>
        <div class="share-btns">
          <a class="share-service-btn line"
             href="https://line.me/R/msg/text/?${encodedShareText}"
             target="_blank" rel="noopener">
            <svg class="svc-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.05 2 11.07c0 3.46 2.18 6.49 5.47 8.19l-.7 2.56 2.93-1.54c.73.2 1.5.31 2.3.31 5.52 0 10-4.05 10-9.07C22 6.05 17.52 2 12 2zm5.29 11.85c-.22.6-1.28 1.14-1.77 1.21-.45.06-1.02.09-1.65-.1-.38-.12-.87-.28-1.49-.55-2.62-1.13-4.33-3.77-4.46-3.95-.13-.18-1.06-1.41-1.06-2.69s.67-1.91.91-2.17c.24-.26.52-.33.69-.33.17 0 .35 0 .5.01.16.01.37-.06.58.44.22.52.75 1.82.81 1.96.07.13.11.28.02.45-.09.17-.13.28-.26.43-.13.15-.27.33-.38.45-.13.13-.27.27-.11.53.15.26.68 1.12 1.46 1.81.99.88 1.84 1.16 2.1 1.29.26.13.41.11.56-.07.15-.18.65-.76.82-1.02.17-.26.34-.22.58-.13.24.09 1.52.72 1.78.85.26.13.43.19.5.3.06.1.06.6-.16 1.17z"/></svg>
            LINE
          </a>
          <a class="share-service-btn x"
             href="https://twitter.com/intent/tweet?text=${encodedShareText}"
             target="_blank" rel="noopener">
            <svg class="svc-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            X
          </a>
          <a class="share-service-btn mail"
             href="mailto:?subject=${encodeURIComponent('日程調整の結果')}&body=${encodedShareText}">
            <svg class="svc-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            メール
          </a>

          ${hasNativeShare ? `
          <button class="share-service-btn native" id="res-native-btn">
            <svg class="svc-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            その他のアプリ
          </button>` : ''}
        </div>
      </div>` : ''}

      <button class="btn btn-secondary" id="restart-btn" style="margin-top:4px">トップに戻る</button>
    </div>`;

  // URLコピーボタン
  if (okDays.length) {
    app.querySelector('#res-url-copy-btn').onclick = () => {
      navigator.clipboard.writeText(resultUrl)
        .then(() => {
          const fb = app.querySelector('#res-copy-fb');
          fb.textContent = '✓ URLをコピーしました！';
          setTimeout(() => { fb.textContent = ''; }, 2500);
        })
        .catch(() => { app.querySelector('#result-url-input').select(); });
    };
    if (hasNativeShare) {
      app.querySelector('#res-native-btn').onclick = () => {
        navigator.share({
          title: '日程調整の結果',
          text: shareText,
          url: resultUrl
        }).catch(() => {});
      };
    }
  }

  app.querySelector('#restart-btn').onclick = () => {
    history.replaceState(null, '', location.pathname);
    showTopScreen();
  };
  // 広告
  app.querySelector('.result-screen').insertAdjacentHTML('beforeend', adSlotHtml());
  pushAd();
}

// ============================================================
// お問い合わせフォーム（Netlify Forms 経由）
// メッセージは Netlify のサーバーに保存され、
// Netlify 管理画面（https://app.netlify.com）でのみ閲覧可能。
// パスワードはコードに存在しない。Netlifyアカウントのログインで保護される。
// ============================================================

function showContactModal() {
  const old = document.getElementById('contact-modal');
  if (old) old.remove();

  const overlay = document.createElement('div');
  overlay.id = 'contact-modal';
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-card">
      <button class="modal-close" id="modal-close-btn">&times;</button>
      <h3>お問い合わせ</h3>
      <p>ご意見・ご要望・不具合報告などをお送りください。<br>
         いただいたメッセージは管理者が確認します。</p>
      <div class="modal-field">
        <label>お名前（任意）</label>
        <input type="text" id="contact-name" placeholder="匿名でも送れます" maxlength="50" />
      </div>
      <div class="modal-field">
        <label>メッセージ <span style="color:var(--red-bdr)">*</span></label>
        <textarea id="contact-body" rows="5" maxlength="1000"
          placeholder="ご自由にお書きください（1000文字以内）"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="modal-cancel-btn">キャンセル</button>
        <button class="btn btn-primary"   id="modal-send-btn">送信</button>
      </div>
      <p id="contact-result"
         style="font-size:.8rem;margin-top:10px;min-height:1.2em"></p>
    </div>`;

  document.body.appendChild(overlay);

  const close = () => overlay.remove();
  document.getElementById('modal-close-btn').onclick  = close;
  document.getElementById('modal-cancel-btn').onclick = close;
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });

  document.getElementById('modal-send-btn').onclick = async () => {
    const nameEl   = document.getElementById('contact-name');
    const bodyEl   = document.getElementById('contact-body');
    const resultEl = document.getElementById('contact-result');
    const sendBtn  = document.getElementById('modal-send-btn');

    const name = nameEl.value.trim();
    const body = bodyEl.value.trim();

    if (!body) {
      resultEl.style.color = 'var(--red-bdr)';
      resultEl.textContent = 'メッセージを入力してください';
      return;
    }

    sendBtn.disabled    = true;
    sendBtn.textContent = '送信中...';
    resultEl.textContent = '';

    // Netlify Forms への送信（application/x-www-form-urlencoded 形式）
    // Content-Type ヘッダーを明示して文字列で送る
    const params = new URLSearchParams();
    params.append('form-name', 'contact');
    params.append('name',      name || '匿名');
    params.append('message',   body);
    params.append('bot-field', '');  // ハニーポット（スパム対策）

    try {
      const res = await fetch('/', {
        method:  'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body:    params.toString()
      });

      if (res.ok) {
        resultEl.style.color = 'var(--green)';
        resultEl.textContent = '✓ 送信しました。ありがとうございます！';
        setTimeout(close, 2200);
      } else {
        // Netlify以外の環境（ローカル等）では 405 が返る
        throw new Error('status ' + res.status);
      }
    } catch(e) {
      // ローカル環境・ネットワークエラー時のフォールバック
      // → 送信内容をクリップボードにコピーして案内
      const fallbackText = '【お問い合わせ内容】\nお名前: ' + (name || '匿名') + '\nメッセージ: ' + body;
      try {
        await navigator.clipboard.writeText(fallbackText);
        resultEl.style.color = 'var(--accent)';
        resultEl.innerHTML   =
          'Netlify環境以外では自動送信できません。<br>' +
          '内容をクリップボードにコピーしました。<br>' +
          '<span style="font-size:.75rem;color:var(--muted)">(' + e.message + ')</span>';
      } catch(ce) {
        resultEl.style.color = 'var(--red-bdr)';
        resultEl.textContent = '送信に失敗しました。Netlifyにデプロイ後にお試しください。';
      }
      sendBtn.disabled    = false;
      sendBtn.textContent = '送信';
    }
  };
}

// ============================================================
// 管理者リンク → Netlify 管理画面へ直接リンク
// パスワードはコードに存在しない。Netlifyアカウントで保護される。
// ============================================================
function showAdminLogin() {
  if (confirm('Netlify 管理画面（お問い合わせ一覧）を開きますか？\nNetlifyアカウントへのログインが必要です。')) {
    window.open(
      'https://app.netlify.com/sites/simplescheduler-app/forms',
      '_blank'
    );
  }
}
